<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration page</title>
    <link rel="stylesheet" href="style.css" >
</head>
<body>
    <h1 class = "heading">PRASANG</h1>
    <div class="form_box">
    <h2 class = "inner_heading">SIGN UP</h2>
    <form action="" class="form">
        <input type="text" name="f_name" class = "f_name" placeholder="First name"><br>
        <input type="text" name = "l_name" class = "l_name" placeholder="Last name"><br>
        <input type="email" name = "email" class = "email" placeholder="Email"><br>
        <input type = "text" name = "username" class="username" placeholder="Username"><br>
        <input type = "password" name = "password" class="password" placeholder="New Password"><br>
        <input type = "password" name = "c_password" class="c_password" placeholder="confirm Password"><br>
        <button class="button">Register</button>
    </form>
    </div>
</body>
</html>
